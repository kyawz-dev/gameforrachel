<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCREAM BIRD 🐦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  
  body {
    background: #1a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    font-family: "Arial Rounded MT Bold", Arial, sans-serif;
  }

  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #score {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 52px;
    font-weight: 900;
    color: white;
    text-shadow: 0 4px 0 #ff6b9d, 0 0 20px rgba(255,107,157,0.6);
    letter-spacing: -2px;
    z-index: 10;
  }

  #micBar {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 7px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.3);
  }

  #micFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #ff6b9d);
    border-radius: 7px;
    transition: width 0.05s ease;
  }

  #micLabel {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 5, 25, 0.88);
    z-index: 20;
    pointer-events: all;
    cursor: pointer;
    gap: 18px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: 52px;
    font-weight: 900;
    color: white;
    text-align: center;
    text-shadow: 0 0 30px #ff6b9d;
    line-height: 1.1;
    letter-spacing: -2px;
  }

  .overlay-sub {
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 0 30px;
    line-height: 1.5;
  }

  .overlay-score {
    font-size: 38px;
    font-weight: 900;
    color: #ffdd00;
    text-shadow: 0 3px 0 #cc8800;
  }

  .tap-hint {
    margin-top: 10px;
    background: linear-gradient(135deg, #ff6b9d, #c44dff);
    color: white;
    font-size: 20px;
    font-weight: 900;
    padding: 16px 40px;
    border-radius: 50px;
    text-align: center;
    box-shadow: 0 6px 0 #882266, 0 0 30px rgba(255,107,157,0.5);
    animation: pulse 1.2s ease-in-out infinite;
    letter-spacing: 0.5px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .bird-preview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #ff6b9d;
    box-shadow: 0 0 25px #ff6b9d;
  }

  .bird-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }
</style>
</head>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const micFill = document.getElementById('micFill');

let W, H;

function resize() {
  const wrapper = document.getElementById('gameWrapper');
  W = canvas.width = wrapper.clientWidth;
  H = canvas.height = wrapper.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ---- Face Image ----
const faceImg = new Image();
faceImg.src = FACE_SRC;

// ---- Game State ----
let state = 'start'; // start | playing | dead
let score = 0;
let hiScore = parseInt(localStorage.getItem('screambird_hi') || '0');
let frames = 0;

// ---- Bird ----
const bird = {
  x: 0, y: 0, vy: 0,
  r: 34,
  gravity: 0.55,
  flapStrength: -10,
  maxFall: 12,
  wingAngle: 0,
  wingDir: 1,
  rotation: 0,
  reset() {
    this.x = W * 0.28;
    this.y = H * 0.42;
    this.vy = 0;
    this.rotation = 0;
  }
};

// ---- Pipes ----
const PIPE_W = 64;
const GAP = 210;
let pipes = [];

function spawnPipe() {
  const minTop = H * 0.15;
  const maxTop = H * 0.65;
  const topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({
    x: W + PIPE_W,
    topH,
    botY: topH + GAP,
    scored: false
  });
}

// ---- Stars BG ----
const stars = Array.from({length: 80}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.8 + 0.4,
  a: Math.random()
}));

// ---- Particles ----
let particles = [];
function burst(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      color: ['#ff6b9d','#ffdd00','#00ff88','#c44dff','#fff'][Math.floor(Math.random()*5)],
      r: 3 + Math.random() * 4
    });
  }
}

// ---- Mic / Voice ----
let micVolume = 0;
let micActive = false;
let analyser, micDataArray;

async function initMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    micDataArray = new Uint8Array(analyser.frequencyBinCount);
    micActive = true;
  } catch(e) {
    console.warn('Mic not available:', e);
  }
}

function getMicVolume() {
  if (!micActive || !analyser) return 0;
  analyser.getByteFrequencyData(micDataArray);
  let sum = 0;
  for (let i = 0; i < micDataArray.length; i++) sum += micDataArray[i];
  return sum / (micDataArray.length * 255);
}

// ---- Input ----
let touchFlap = false;
document.addEventListener('touchstart', (e) => {
  if (state === 'playing') touchFlap = true;
});
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && state === 'playing') touchFlap = true;
});

overlay.addEventListener('click', startGame);
overlay.addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });

async function startGame() {
  if (!micActive) await initMic();
  overlay.classList.add('hidden');
  score = 0;
  pipes = [];
  particles = [];
  frames = 0;
  bird.reset();
  state = 'playing';
  bird.vy = bird.flapStrength * 0.5;
}

// ---- Draw Helpers ----
function drawStars() {
  stars.forEach(s => {
    ctx.globalAlpha = 0.3 + 0.7 * s.a * (0.5 + 0.5 * Math.sin(frames * 0.02 + s.x * 10));
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0d0621');
  grd.addColorStop(0.5, '#1a0a3e');
  grd.addColorStop(1, '#0a1a2e');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Ground
  const groundH = 55;
  const gG = ctx.createLinearGradient(0, H - groundH, 0, H);
  gG.addColorStop(0, '#2d4a1e');
  gG.addColorStop(1, '#1a2d0f');
  ctx.fillStyle = gG;
  ctx.fillRect(0, H - groundH, W, groundH);

  // Ground line
  ctx.strokeStyle = '#4a7a2e';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, H - groundH);
  ctx.lineTo(W, H - groundH);
  ctx.stroke();
}

function drawPipe(pipe) {
  const r = 10;
  // Pipe body gradient
  const makeGrad = (x) => {
    const g = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
    g.addColorStop(0, '#2a7a1a');
    g.addColorStop(0.3, '#4fbc35');
    g.addColorStop(0.7, '#3a9e22');
    g.addColorStop(1, '#1f5c11');
    return g;
  };

  // Top pipe
  const topY = 0;
  ctx.fillStyle = makeGrad(pipe.x);
  roundRect(ctx, pipe.x, topY, PIPE_W, pipe.topH - 18, r);
  ctx.fill();
  // Top cap
  ctx.fillStyle = makeGrad(pipe.x - 6);
  roundRect(ctx, pipe.x - 6, pipe.topH - 28, PIPE_W + 12, 28, 5);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(ctx, pipe.x + 6, topY, 14, pipe.topH - 18, 4);
  ctx.fill();

  // Bottom pipe
  ctx.fillStyle = makeGrad(pipe.x);
  roundRect(ctx, pipe.x, pipe.botY + 18, PIPE_W, H - pipe.botY - 18, r);
  ctx.fill();
  // Bottom cap
  ctx.fillStyle = makeGrad(pipe.x - 6);
  roundRect(ctx, pipe.x - 6, pipe.botY, PIPE_W + 12, 28, 5);
  ctx.fill();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(ctx, pipe.x + 6, pipe.botY + 18, 14, H - pipe.botY - 36, 4);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBird() {
  const bx = bird.x, by = bird.y, r = bird.r;
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(Math.max(-0.5, Math.min(0.8, bird.rotation)));

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(4, r + 6, r * 0.9, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (yellow egg shape)
  const bodyGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, r * 1.3);
  bodyGrad.addColorStop(0, '#fff9a0');
  bodyGrad.addColorStop(0.5, '#ffd700');
  bodyGrad.addColorStop(1, '#e69500');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 6, r * 0.75, r * 0.9, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing
  const wingFlap = Math.sin(bird.wingAngle) * 0.4;
  ctx.save();
  ctx.translate(-r * 0.3, 4);
  ctx.rotate(wingFlap - 0.2);
  ctx.fillStyle = '#ffc107';
  ctx.beginPath();
  ctx.ellipse(-14, 2, 18, 10, 0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e69500';
  ctx.beginPath();
  ctx.ellipse(-14, 3, 14, 7, 0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Tail feathers
  ctx.fillStyle = '#ffc107';
  ctx.beginPath();
  ctx.ellipse(r * 0.5, 8, 14, 7, -0.5, 0, Math.PI*2);
  ctx.fill();

  // Face circle (photo)
  const faceR = r * 0.92;
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, -2, faceR, 0, Math.PI*2);
  ctx.clip();
  // white bg
  ctx.fillStyle = '#fff';
  ctx.fillRect(-faceR, -faceR - 2, faceR*2, faceR*2);
  if (faceImg.complete) {
    // Draw face centered at top (focus on face)
    const imgAR = faceImg.naturalWidth / faceImg.naturalHeight;
    let sw = faceR * 2;
    let sh = sw / imgAR;
    if (sh < faceR * 2) { sh = faceR * 2; sw = sh * imgAR; }
    ctx.drawImage(faceImg, -sw/2, -faceR - 2, sw, sh);
  }
  ctx.restore();

  // Face border
  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, -2, faceR, 0, Math.PI*2);
  ctx.stroke();

  // Beak
  ctx.fillStyle = '#ff8c00';
  ctx.beginPath();
  ctx.moveTo(faceR - 2, 2);
  ctx.lineTo(faceR + 14, 6);
  ctx.lineTo(faceR - 2, 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#cc5500';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawGameOverPanel() {
  // translucent panel
  ctx.fillStyle = 'rgba(10, 5, 30, 0.7)';
  roundRect(ctx, W/2 - 130, H/2 - 100, 260, 200, 20);
  ctx.fill();
  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 3;
  roundRect(ctx, W/2 - 130, H/2 - 100, 260, 200, 20);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 36px Arial';
  ctx.fillText('GAME OVER 💀', W/2, H/2 - 55);

  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 48px Arial';
  ctx.fillText(score, W/2, H/2 + 5);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '16px Arial';
  ctx.fillText('BEST: ' + hiScore, W/2, H/2 + 40);

  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = 'bold 18px Arial';
  ctx.fillText('TAP TO PLAY AGAIN', W/2, H/2 + 80);
  ctx.textAlign = 'left';
}

// ---- Collision ----
function checkCollision() {
  const groundH = 55;
  if (bird.y + bird.r > H - groundH) return true;
  if (bird.y - bird.r < 0) return true;
  for (const p of pipes) {
    const bLeft = bird.x - bird.r + 6;
    const bRight = bird.x + bird.r - 6;
    const bTop = bird.y - bird.r + 6;
    const bBot = bird.y + bird.r - 6;
    if (bRight > p.x + 4 && bLeft < p.x + PIPE_W - 4) {
      if (bTop < p.topH || bBot > p.botY) return true;
    }
  }
  return false;
}

// ---- Main Loop ----
let lastTime = 0;
let pipeTimer = 0;
const PIPE_INTERVAL = 90;
const PIPE_SPEED_BASE = 3.2;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  frames++;

  // Mic
  micVolume = getMicVolume();
  micFill.style.width = (micVolume * 100 * 3).toFixed(1) + '%';

  // Background
  drawBackground();

  if (state === 'playing') {
    const THRESHOLD = 0.04;
    const flying = micVolume > THRESHOLD || touchFlap;
    touchFlap = false;

    if (flying) {
      bird.vy = bird.flapStrength;
      burst(bird.x - 10, bird.y + 10);
    }

    bird.vy = Math.min(bird.vy + bird.gravity, bird.maxFall);
    bird.y += bird.vy;
    bird.rotation = bird.vy * 0.08;

    bird.wingAngle += flying ? 0.5 : 0.18;

    // Pipes
    pipeTimer++;
    const speed = PIPE_SPEED_BASE + score * 0.06;

    if (pipeTimer >= PIPE_INTERVAL) {
      pipeTimer = 0;
      spawnPipe();
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= speed;
      if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x - bird.r) {
        pipes[i].scored = true;
        score++;
        scoreEl.textContent = score;
        burst(bird.x, bird.y);
      }
      if (pipes[i].x + PIPE_W < -10) pipes.splice(i, 1);
    }

    pipes.forEach(drawPipe);
    drawParticles();

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.life -= 0.035;
      if (p.life <= 0) particles.splice(i, 1);
    }

    drawBird();

    if (checkCollision()) {
      state = 'dead';
      if (score > hiScore) { hiScore = score; localStorage.setItem('screambird_hi', hiScore); }
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <div class="overlay-title">GAME<br>OVER 😭</div>
        <div class="bird-preview"><img src="${FACE_SRC}" alt="Bird"></div>
        <div class="overlay-score">Score: ${score}</div>
        <div class="overlay-sub">Best: ${hiScore}</div>
        <div class="tap-hint">TAP TO RETRY</div>
      `;
    }

  } else {
    pipes.forEach(drawPipe);
    drawParticles();
    drawBird();
  }
}

// Start loop
requestAnimationFrame(loop);
</script>
